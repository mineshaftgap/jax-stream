# swipe_smoke.yaml -- Maestro smoke test for Jax Stream swipe-to-tag.
#
# Drives an Android emulator's Chrome at the HA clock dashboard and performs a
# left then a right swipe, capturing a screenshot before and after each. It
# verifies the GESTURE PATH (swipe -> module fires -> shell_command ->
# photo advances). It does NOT prove the Immich tag write succeeded -- that
# needs the rotated key with tag.* scopes and is confirmed in Immich, not here.
#
# Prereqs:
#   - Android emulator running, Maestro installed (maestro.mobile.dev).
#   - The swipe module deployed + HA restarted (so /local/jax_stream_swipe.js
#     loads).
#   - Chrome on the emulator already logged in to HA (run once by hand; this
#     flow uses clearState:false to keep that session). Trusted-network /
#     long-lived-token login avoids an interactive auth step here.
#
# Run:
#   maestro test -e HA_CLOCK_URL="https://ha.zenrelic.com/<dashboard>/<clock-view>" \
#     jax-stream/test/maestro/swipe_smoke.yaml
#
# Set HA_CLOCK_URL to the actual clock-view URL for the device/stream under
# test (the View Assist dashboard path that shows the jax-stream background).
#
# What to look for:
#   - 01_clock_loaded: the clock view with an Immich photo behind it.
#   - 02/03 after swipe: a DIFFERENT photo (the advance) and, briefly, the
#     "<- tagged" / "tagged ->" toast. If the photo does not change, open
#     chrome://inspect from the host and watch the console for
#     "[jax-stream-swipe] loaded" and any callService error, plus the Network
#     tab for the POST to /api/services/shell_command/jax_stream_swipe.
#
# Tuning: if a swipe is misread as a tap/scroll, widen the horizontal travel
# (start/end x) or lengthen duration; the module defaults need |dx| > 60px and
# |dx| > 1.5*|dy| within 900ms.

appId: com.android.chrome
env:
  HA_CLOCK_URL: "https://ha.zenrelic.com"
---
- launchApp:
    clearState: false
- openLink: ${HA_CLOCK_URL}
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: 01_clock_loaded

# Swipe LEFT (tags swipe_left_tag if configured, then advances)
- swipe:
    start: "85%, 50%"
    end: "15%, 50%"
    duration: 250
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 02_after_swipe_left

# Swipe RIGHT (tags swipe_right_tag if configured, then advances)
- swipe:
    start: "15%, 50%"
    end: "85%, 50%"
    duration: 250
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 03_after_swipe_right
