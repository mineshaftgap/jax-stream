blueprint:
  name: "Jax Stream"
  description: >
    Periodically fetches one random photo from an Immich album and writes
    it into a View Assist images subdirectory so VA's LOCAL_RANDOM
    background mode rotates through your album on any device pointed at
    that stream's path.


    Create one automation from this blueprint per "stream" (i.e. per
    album you want to show). Different View Assist devices can target
    different streams by setting their Dashboard Options path to
    images/jax-stream/<stream_name>.


    With the swipe module enabled, swipe left removes the photo from the
    album (handy for curation); swipe right just skips to the next one.


    Prerequisites (one-time setup, see the README for details):

      - shell_scripts/jax_stream_refresh.sh installed at /config/shell_scripts/

      - shell_commands/jax_stream_refresh.yaml merged so shell_command.jax_stream_refresh exists
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    immich_host:
      name: "Immich URL"
      description: >
        Base URL of your Immich server, no trailing slash.
        e.g. https://immich.example.com
      selector:
        text:
    immich_api_key:
      name: "Immich API key"
      description: >
        Immich API key. Needs asset.read + asset.view for the basic
        slideshow. If you enable swipe, also add albumAsset.delete so
        swipe-left can remove photos from the album.
        Create in Immich -> Account Settings -> API Keys -> New API Key.
      selector:
        text:
          type: password
    album_id:
      name: "Immich album ID"
      description: >
        UUID of the Immich album this stream pulls photos from. Find it
        in the album page URL: https://your-immich/albums/<this-uuid>
      selector:
        text:
    stream_name:
      name: "Stream name"
      description: >
        Subdirectory under /config/view_assist/images/jax-stream/
        that this stream's photo gets written to. Pick a short identifier
        (no spaces). Any View Assist device that should show this
        stream sets its Dashboard Options path field to
        images/jax-stream/<this-name>.
      default: "default"
      selector:
        text:
    refresh_interval:
      name: "Refresh interval"
      description: >
        How often this stream fetches a new random photo. View Assist's
        display polling minimum is 1 minute, so values faster than that
        will not reach the display sooner -- the script will just
        write to disk more often than VA picks it up. Pick something
        slower than 1 minute for a quiet bedroom; faster for the kitchen
        if you ever go below VA's 1-minute floor.
      default: "/1"
      selector:
        select:
          custom_value: true
          options:
            - label: "Every minute"
              value: "/1"
            - label: "Every 2 minutes"
              value: "/2"
            - label: "Every 5 minutes"
              value: "/5"
            - label: "Every 10 minutes"
              value: "/10"
            - label: "Every 15 minutes"
              value: "/15"
            - label: "Every 30 minutes"
              value: "/30"
    landscape_only:
      name: "Landscape only"
      description: >
        Show only landscape (wider-than-tall) photos. Immich has no
        server-side orientation filter, so the script over-fetches a batch
        and keeps the first landscape one (orientation-corrected). If an
        album is mostly portrait it may occasionally keep the current photo
        rather than blank the screen.
      default: false
      selector:
        boolean:
    enable_swipe:
      name: "Enable swipe"
      description: >
        Turn on swipe gestures on the bundled clock view. Swipe left removes
        the photo from the album and advances; swipe right just advances.
        Requires the one-time frontend module install (see README) and a key
        with albumAsset.delete scope. When off, the stream is timer-only.
      default: false
      selector:
        boolean:
    allow_insecure:
      name: "Allow insecure HTTPS"
      description: >
        Add curl -k so a self-signed / private-CA https:// Immich URL works
        without editing the script. Disables TLS verification entirely --
        fine on a trusted LAN, not for traffic crossing untrusted networks.
        Leave off for http://, publicly-trusted https://, or an installed CA.
      default: false
      selector:
        boolean:

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: !input refresh_interval

action:
  - service: shell_command.jax_stream_refresh
    data:
      immich_host: !input immich_host
      immich_api_key: !input immich_api_key
      album_id: !input album_id
      stream_name: !input stream_name
      landscape_only: !input landscape_only
      allow_insecure: !input allow_insecure
